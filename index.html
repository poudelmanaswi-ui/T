<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toastmasters Toolkit</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111827; color: #fff; }
input, textarea, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

const PRESETS = [
  { label: "1–2 min", sub: "Table Topics", g: 60,  y: 90,  r: 120 },
  { label: "2–3 min", sub: "Evaluation",   g: 120, y: 150, r: 180 },
  { label: "4–6 min", sub: "Prepared",     g: 240, y: 300, r: 360 },
  { label: "5–7 min", sub: "Prepared",     g: 300, y: 360, r: 420 },
  { label: "8–10 min",sub: "Advanced",     g: 480, y: 540, r: 600 },
];

const ROLES = [
  "Toastmaster of the Day","General Evaluator","Timer","Ah Counter",
  "Grammarian","Sgt. at Arms","Table Topics Master","Word of the Day",
  "Prepared Speaker 1","Prepared Speaker 2","Speech Evaluator 1",
  "Speech Evaluator 2","Joke Master","Inspiration"
];

const AW = ["Ah","Um","So","Y'know","Like"];
const AK = ["ah","um","so","yk","lk"];

const DEF_AGENDA = [
  "Call to Order & Welcome","Sergeant at Arms","Word of the Day",
  "Table Topics Session","Break","Prepared Speeches","Speech Evaluations",
  "General Evaluation","Business & Announcements","Awards & Closing"
];

function fmt(s) {
  return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
}

function Timer() {
  const [pi, setPi] = useState(0);           // 0-4 = presets, 5 = custom
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [stopped, setStopped] = useState(false);
  const [customMin, setCustomMin] = useState("");
  const [customMax, setCustomMax] = useState("");
  const [customActive, setCustomActive] = useState(false);
  const iv = useRef(null);

  // Determine active thresholds
  let p;
  if (customActive && customMin && customMax) {
    const minS = parseFloat(customMin) * 60;
    const maxS = parseFloat(customMax) * 60;
    const mid  = Math.round((minS + maxS) / 2);
    p = { g: mid, y: maxS, r: maxS, label: `${customMin}–${customMax} min`, sub: "Custom" };
  } else {
    p = PRESETS[pi] || PRESETS[0];
  }

  useEffect(() => {
    if (running) {
      iv.current = setInterval(() => setElapsed(e => e + 1), 1000);
    } else {
      clearInterval(iv.current);
    }
    return () => clearInterval(iv.current);
  }, [running]);

  function pickPreset(i) {
    setPi(i); setElapsed(0); setRunning(false); setStopped(false);
    setCustomActive(false);
  }

  function applyCustom() {
    if (!customMin || !customMax || parseFloat(customMin) >= parseFloat(customMax)) {
      alert("Please enter a valid min and max (min must be less than max)");
      return;
    }
    setCustomActive(true);
    setElapsed(0); setRunning(false); setStopped(false);
    setPi(-1);
  }

  function reset() { setElapsed(0); setRunning(false); setStopped(false); }

  function toggle() {
    if (running) { setRunning(false); setStopped(true); }
    else { setRunning(true); setStopped(false); }
  }

  // Color state
  let bgColor = "#111827", sigColor = "#fff", sigText = "READY";
  let circleColor = "rgba(255,255,255,0.08)", circleGlow = "none";

  if (elapsed >= p.r) {
    bgColor = "#7f1d1d"; sigColor = "#fca5a5"; sigText = "OVER TIME";
    circleColor = "#ef4444"; circleGlow = "0 0 60px 20px #ef4444";
  } else if (elapsed >= p.y) {
    bgColor = "#713f12"; sigColor = "#fde68a"; sigText = "WRAPPING UP";
    circleColor = "#eab308"; circleGlow = "0 0 60px 20px #eab308";
  } else if (elapsed >= p.g) {
    bgColor = "#14532d"; sigColor = "#86efac"; sigText = "IN RANGE";
    circleColor = "#22c55e"; circleGlow = "0 0 60px 20px #22c55e";
  } else if (running) {
    bgColor = "#1e1b4b"; sigColor = "#c4b5fd"; sigText = "SPEAKING";
  }

  const hasStarted = elapsed > 0 || running;
  const showTime = !running && hasStarted;

  const btnStyle = {
    padding:"9px 12px", borderRadius:8, cursor:"pointer", fontSize:12, lineHeight:1.5,
    color:"#fff"
  };

  return (
    <div style={{
      minHeight:"70vh", borderRadius:16, padding:24,
      background:bgColor, transition:"background 0.6s",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"space-between"
    }}>

      {/* PRESET BUTTONS */}
      <div style={{width:"100%"}}>
        <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
          {PRESETS.map((pr,i) => (
            <button key={i} onClick={() => pickPreset(i)} style={{
              ...btnStyle,
              border:`2px solid ${pi===i && !customActive ? "#a78bfa" : "rgba(255,255,255,0.2)"}`,
              background: pi===i && !customActive ? "rgba(124,106,247,0.4)" : "rgba(0,0,0,0.25)",
            }}>
              <div style={{fontWeight:700}}>{pr.label}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>{pr.sub}</div>
            </button>
          ))}

          {/* CUSTOM BUTTON */}
          <button onClick={() => setPi(-1)} style={{
            ...btnStyle,
            border:`2px solid ${pi===-1 ? "#f59e0b" : "rgba(255,255,255,0.2)"}`,
            background: pi===-1 ? "rgba(245,158,11,0.3)" : "rgba(0,0,0,0.25)",
          }}>
            <div style={{fontWeight:700}}>Custom</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>Set your own</div>
          </button>
        </div>

        {/* CUSTOM INPUT PANEL */}
        {pi === -1 && (
          <div style={{
            background:"rgba(0,0,0,0.35)", borderRadius:10, padding:14,
            marginBottom:10, display:"flex", gap:10, alignItems:"flex-end", flexWrap:"wrap", justifyContent:"center"
          }}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>Min (minutes)</label>
              <input
                type="number" min="0" placeholder="e.g. 10"
                value={customMin} onChange={e => setCustomMin(e.target.value)}
                style={{width:100,padding:"8px 10px",borderRadius:7,border:"1px solid #f59e0b",
                  background:"#111827",color:"#fff",fontSize:14,outline:"none"}}
              />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>Max (minutes)</label>
              <input
                type="number" min="0" placeholder="e.g. 15"
                value={customMax} onChange={e => setCustomMax(e.target.value)}
                style={{width:100,padding:"8px 10px",borderRadius:7,border:"1px solid #f59e0b",
                  background:"#111827",color:"#fff",fontSize:14,outline:"none"}}
              />
            </div>
            <button onClick={applyCustom} style={{
              padding:"9px 20px",borderRadius:8,border:"none",
              background:"#f59e0b",color:"#000",fontSize:14,fontWeight:700,cursor:"pointer"
            }}>
              Apply
            </button>
            {customActive && customMin && customMax && (
              <div style={{width:"100%",textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:4}}>
                🟢 Green at {fmt(Math.round((parseFloat(customMin)+parseFloat(customMax))/2*60))} &nbsp;·&nbsp;
                🟡 Yellow at {fmt(parseFloat(customMax)*60)} &nbsp;·&nbsp;
                🔴 Red at {fmt(parseFloat(customMax)*60)}
              </div>
            )}
          </div>
        )}
      </div>

      {/* COLOR CIRCLE */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:"16px 0"}}>
        <div style={{
          width:160,height:160,borderRadius:"50%",
          background:circleColor,
          boxShadow:circleGlow,
          transition:"all 0.5s",
          display:"flex",alignItems:"center",justifyContent:"center"
        }}>
          {showTime && (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,color:"#fff"}}>{fmt(elapsed)}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",letterSpacing:1}}>elapsed</div>
            </div>
          )}
        </div>

        <div style={{fontSize:13,fontWeight:700,letterSpacing:3,color:sigColor,textTransform:"uppercase"}}>
          {sigText}
        </div>

        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",letterSpacing:1}}>
          {customActive && customMin && customMax
            ? `${customMin}–${customMax} min · Custom`
            : `${PRESETS[pi] ? PRESETS[pi].label : ""} · ${PRESETS[pi] ? PRESETS[pi].sub : ""}`
          }
        </div>
      </div>

      {/* CONTROLS */}
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={toggle} style={{
          padding:"13px 40px",borderRadius:10,border:"none",
          background: running ? "rgba(0,0,0,0.4)" : "#7c6af7",
          color:"#fff",fontSize:17,fontWeight:700,cursor:"pointer",
          border: running ? "2px solid rgba(255,255,255,0.3)" : "none"
        }}>
          {running ? "⏸ Pause" : elapsed > 0 ? "▶ Resume" : "▶ Start"}
        </button>
        <button onClick={reset} style={{
          padding:"13px 24px",borderRadius:10,
          border:"2px solid rgba(255,255,255,0.2)",
          background:"rgba(0,0,0,0.25)",
          color:"#fff",fontSize:17,cursor:"pointer"
        }}>
          ↺ Reset
        </button>
      </div>
    </div>
  );
}

function Roles() {
  const [roles, setRoles] = useState(Object.fromEntries(ROLES.map(r=>[r,""])));
  const inp = {background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",padding:"7px 10px",fontSize:13,outline:"none",flex:1};
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
        {ROLES.map(r => (
          <div key={r} style={{display:"flex",alignItems:"center",gap:8,background:"#111827",borderRadius:6,padding:"6px 10px"}}>
            <span style={{fontSize:11,color:"#9ca3af",width:110,flexShrink:0}}>{r}</span>
            <input style={inp} placeholder="Name…" value={roles[r]} onChange={e => setRoles(v => ({...v,[r]:e.target.value}))}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={() => { const t=ROLES.map(r=>r+": "+(roles[r]||"—")).join("\n"); navigator.clipboard.writeText(t).then(()=>alert("Copied!")); }}
          style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#7c6af7",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
          📋 Copy to Clipboard
        </button>
        <button onClick={() => setRoles(Object.fromEntries(ROLES.map(r=>[r,""])))}
          style={{padding:"9px 18px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>
          Clear All
        </button>
      </div>
    </div>
  );
}

function AhCounter() {
  const [spks, setSpks] = useState([
    {name:"Speaker 1",...Object.fromEntries(AK.map(k=>[k,0]))},
    {name:"Speaker 2",...Object.fromEntries(AK.map(k=>[k,0]))}
  ]);
  function adj(i,k,d) { setSpks(sp => sp.map((s,j) => j===i ? {...s,[k]:Math.max(0,s[k]+d)} : s)); }
  const btn = {padding:"3px 10px",borderRadius:6,border:"1px solid #374151",background:"#111827",color:"#fff",cursor:"pointer",fontSize:14};
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {spks.map((sp,i) => (
          <div key={i} style={{background:"#111827",borderRadius:8,padding:12}}>
            <input value={sp.name} onChange={e => setSpks(s => s.map((x,j) => j===i ? {...x,name:e.target.value} : x))}
              style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #374151",color:"#fff",fontSize:14,fontWeight:700,outline:"none",marginBottom:10,paddingBottom:4}}/>
            {AK.map((k,j) => (
              <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <span style={{fontSize:12,color:"#9ca3af",width:40}}>{AW[j]}</span>
                <button style={btn} onClick={() => adj(i,k,-1)}>−</button>
                <button style={btn} onClick={() => adj(i,k,1)}>+</button>
                <span style={{fontWeight:700,fontSize:15,minWidth:22}}>{sp[k]}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={() => setSpks(s => [...s,{name:`Speaker ${s.length+1}`,...Object.fromEntries(AK.map(k=>[k,0]))}])}
          style={{padding:"8px 16px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>+ Add Speaker</button>
        <button onClick={() => setSpks(s => s.map(x => ({...x,...Object.fromEntries(AK.map(k=>[k,0]))})))}
          style={{padding:"8px 16px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#ef4444",cursor:"pointer",fontSize:13}}>↺ Reset All</button>
      </div>
      <div style={{borderTop:"1px solid #374151",paddingTop:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:"#9ca3af"}}>SUMMARY</div>
        {spks.map((sp,i) => {
          const tot=AK.reduce((a,k)=>a+sp[k],0);
          const det=AW.map((w,j)=>w+": "+sp[AK[j]]).filter((_,j)=>sp[AK[j]]>0).join("  ·  ");
          return (
            <div key={i} style={{padding:"7px 0",borderBottom:"1px solid #1f2937"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:600}}>{sp.name}</span>
                <span style={{fontWeight:700,fontSize:15,color:tot>5?"#eab308":"#22c55e"}}>×{tot}</span>
              </div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{det||"None recorded"}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WordOfDay() {
  const [w,setW]=useState(""); const [t,setT]=useState("");
  const [d,setD]=useState(""); const [u,setU]=useState("");
  const inp={background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",padding:"8px 11px",fontSize:13,outline:"none",width:"100%"};
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input style={inp} placeholder="Word" value={w} onChange={e=>setW(e.target.value)}/>
        <input style={{...inp,maxWidth:160}} placeholder="Part of speech" value={t} onChange={e=>setT(e.target.value)}/>
      </div>
      <textarea style={{...inp,minHeight:60,resize:"vertical",marginBottom:8,display:"block"}} placeholder="Definition…" value={d} onChange={e=>setD(e.target.value)}/>
      <textarea style={{...inp,minHeight:60,resize:"vertical",marginBottom:16,display:"block"}} placeholder="Example sentence…" value={u} onChange={e=>setU(e.target.value)}/>
      <div style={{background:"#111827",border:"1px solid #374151",borderRadius:10,padding:16}}>
        <div style={{fontSize:28,fontWeight:700,color:w?"#c084fc":"#4b5563"}}>{w||"—"}</div>
        {t&&<div style={{fontSize:12,color:"#9ca3af",fontStyle:"italic",margin:"4px 0 8px"}}>{t}</div>}
        <div style={{fontSize:14,lineHeight:1.6}}>{d}</div>
        {u&&<div style={{fontSize:13,color:"#9ca3af",fontStyle:"italic",marginTop:8}}>"{u}"</div>}
      </div>
    </div>
  );
}

function Agenda() {
  const [items,setItems]=useState([...DEF_AGENDA]);
  const inp={background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",padding:"7px 10px",fontSize:13,outline:"none",flex:1};
  return (
    <div>
      {items.map((item,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:12,color:"#6b7280",width:20,textAlign:"right",flexShrink:0}}>{i+1}.</span>
          <input style={inp} value={item} onChange={e=>setItems(a=>a.map((x,j)=>j===i?e.target.value:x))}/>
          <button onClick={()=>setItems(a=>a.filter((_,j)=>j!==i))}
            style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
        </div>
      ))}
      <button onClick={()=>setItems(a=>[...a,""])}
        style={{width:"100%",padding:"8px",borderRadius:8,border:"1px dashed #374151",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:13,marginTop:4,marginBottom:14}}>
        + Add Item
      </button>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{const t=items.filter(Boolean).map((a,i)=>`${i+1}. ${a}`).join("\n");navigator.clipboard.writeText(t).then(()=>alert("Agenda copied!"));}}
          style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#7c6af7",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>📋 Copy Agenda</button>
        <button onClick={()=>setItems([...DEF_AGENDA])}
          style={{padding:"9px 18px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>Load Default</button>
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("timer");
  const tabs=[["timer","⏱ Timer"],["roles","👥 Roles"],["ah","💬 Ah Counter"],["word","📖 Word"],["agenda","📋 Agenda"]];
  return (
    <div style={{minHeight:"100vh",background:"#111827",padding:16}}>
      <div style={{maxWidth:720,margin:"0 auto"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>🎤 Toastmasters Toolkit</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {tabs.map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              padding:"8px 14px",borderRadius:8,cursor:"pointer",fontSize:13,
              border:`2px solid ${tab===id?"#7c6af7":"#374151"}`,
              background:tab===id?"#2a2060":"#1f2937",
              color:"#fff",fontWeight:tab===id?700:400
            }}>{label}</button>
          ))}
        </div>
        <div style={{background:"#1f2937",borderRadius:12,padding:20}}>
          {tab==="timer"  && <Timer/>}
          {tab==="roles"  && <Roles/>}
          {tab==="ah"     && <AhCounter/>}
          {tab==="word"   && <WordOfDay/>}
          {tab==="agenda" && <Agenda/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
