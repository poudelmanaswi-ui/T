<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toastmasters Toolkit</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111827; color: #fff; }
input, textarea, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

const PRESETS = [
  { label: "1–2 min", sub: "Table Topics", g: 60,  y: 90,  r: 120 },
  { label: "2–3 min", sub: "Evaluation",   g: 120, y: 150, r: 180 },
  { label: "4–6 min", sub: "Prepared",     g: 240, y: 300, r: 360 },
  { label: "5–7 min", sub: "Prepared",     g: 300, y: 360, r: 420 },
  { label: "8–10 min",sub: "Advanced",     g: 480, y: 540, r: 600 },
];

const ROLES = [
  "Toastmaster of the Day","General Evaluator","Timer","Ah Counter",
  "Grammarian","Sgt. at Arms","Table Topics Master","Word of the Day",
  "Prepared Speaker 1","Prepared Speaker 2","Speech Evaluator 1",
  "Speech Evaluator 2","Joke Master","Inspiration"
];

const AW = ["Ah","Um","So","Y'know","Like"];
const AK = ["ah","um","so","yk","lk"];

const DEF_AGENDA = [
  "Call to Order & Welcome","Sergeant at Arms","Word of the Day",
  "Table Topics Session","Break","Prepared Speeches","Speech Evaluations",
  "General Evaluation","Business & Announcements","Awards & Closing"
];

function fmt(s) {
  return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
}

function Timer() {
  const [pi, setPi] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const iv = useRef(null);
  const p = PRESETS[pi];

  useEffect(() => {
    if (running) {
      iv.current = setInterval(() => setElapsed(e => e + 1), 1000);
    } else {
      clearInterval(iv.current);
    }
    return () => clearInterval(iv.current);
  }, [running]);

  function pick(i) { setPi(i); setElapsed(0); setRunning(false); }
  function reset()  { setElapsed(0); setRunning(false); }

  let col = "#ffffff", sig = elapsed === 0 ? "READY" : "SPEAKING";
  let gOn = false, yOn = false, rOn = false;
  if      (elapsed >= p.r) { col = "#ef4444"; sig = "OVER TIME";   rOn = true; }
  else if (elapsed >= p.y) { col = "#eab308"; sig = "WRAPPING UP"; yOn = true; }
  else if (elapsed >= p.g) { col = "#22c55e"; sig = "IN RANGE";    gOn = true; }

  return (
    <div style={{textAlign:"center", padding:"8px 0 16px"}}>
      <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:24}}>
        {PRESETS.map((pr,i) => (
          <button key={i} onClick={() => pick(i)} style={{
            padding:"10px 14px", borderRadius:8,
            border: `2px solid ${pi===i ? "#7c6af7" : "#374151"}`,
            background: pi===i ? "#2a2060" : "#1f2937",
            color:"#fff", cursor:"pointer", fontSize:13, lineHeight:1.5
          }}>
            <div style={{fontWeight:700}}>{pr.label}</div>
            <div style={{fontSize:11,color:"#9ca3af"}}>{pr.sub}</div>
          </button>
        ))}
      </div>

      <div style={{fontSize:96,fontWeight:900,color:col,letterSpacing:-4,lineHeight:1,transition:"color 0.3s"}}>
        {fmt(elapsed)}
      </div>
      <div style={{fontSize:11,letterSpacing:3,color:"#6b7280",margin:"8px 0 24px"}}>{sig}</div>

      <div style={{display:"flex",gap:28,justifyContent:"center",marginBottom:8}}>
        {[
          {bg:"#22c55e", on:gOn, lbl:fmt(p.g)},
          {bg:"#eab308", on:yOn, lbl:fmt(p.y)},
          {bg:"#ef4444", on:rOn, lbl:fmt(p.r)}
        ].map((l,i) => (
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <div style={{
              width:56, height:56, borderRadius:"50%", background:l.bg,
              opacity: l.on ? 1 : 0.18,
              boxShadow: l.on ? `0 0 22px 4px ${l.bg}` : "none",
              transition:"all 0.3s"
            }}/>
            <span style={{fontSize:12,color:"#6b7280"}}>{l.lbl}</span>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:20}}>
        <button onClick={() => setRunning(r => !r)} style={{
          padding:"13px 36px", borderRadius:10, border:"none",
          background:"#7c6af7", color:"#fff", fontSize:17, fontWeight:700, cursor:"pointer"
        }}>
          {running ? "⏸ Pause" : "▶ Start"}
        </button>
        <button onClick={reset} style={{
          padding:"13px 24px", borderRadius:10,
          border:"1px solid #374151", background:"#1f2937",
          color:"#fff", fontSize:17, cursor:"pointer"
        }}>
          ↺ Reset
        </button>
      </div>
    </div>
  );
}

function Roles() {
  const [roles, setRoles] = useState(Object.fromEntries(ROLES.map(r=>[r,""])));
  const inp = {background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",padding:"7px 10px",fontSize:13,outline:"none",flex:1};
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
        {ROLES.map(r => (
          <div key={r} style={{display:"flex",alignItems:"center",gap:8,background:"#111827",borderRadius:6,padding:"6px 10px"}}>
            <span style={{fontSize:11,color:"#9ca3af",width:110,flexShrink:0}}>{r}</span>
            <input style={inp} placeholder="Name…" value={roles[r]}
              onChange={e => setRoles(v => ({...v,[r]:e.target.value}))}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={() => {
          const t = ROLES.map(r => r + ": " + (roles[r]||"—")).join("\n");
          navigator.clipboard.writeText(t).then(() => alert("Copied to clipboard!"));
        }} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#7c6af7",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
          📋 Copy to Clipboard
        </button>
        <button onClick={() => setRoles(Object.fromEntries(ROLES.map(r=>[r,""])))}
          style={{padding:"9px 18px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>
          Clear All
        </button>
      </div>
    </div>
  );
}

function AhCounter() {
  const [spks, setSpks] = useState([
    {name:"Speaker 1",...Object.fromEntries(AK.map(k=>[k,0]))},
    {name:"Speaker 2",...Object.fromEntries(AK.map(k=>[k,0]))}
  ]);
  function adj(i,k,d) { setSpks(sp => sp.map((s,j) => j===i ? {...s,[k]:Math.max(0,s[k]+d)} : s)); }
  const btn = {padding:"3px 10px",borderRadius:6,border:"1px solid #374151",background:"#111827",color:"#fff",cursor:"pointer",fontSize:14};
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {spks.map((sp,i) => (
          <div key={i} style={{background:"#111827",borderRadius:8,padding:12}}>
            <input value={sp.name} onChange={e => setSpks(s => s.map((x,j) => j===i ? {...x,name:e.target.value} : x))}
              style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #374151",
                color:"#fff",fontSize:14,fontWeight:700,outline:"none",marginBottom:10,paddingBottom:4}}/>
            {AK.map((k,j) => (
              <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <span style={{fontSize:12,color:"#9ca3af",width:40}}>{AW[j]}</span>
                <button style={btn} onClick={() => adj(i,k,-1)}>−</button>
                <button style={btn} onClick={() => adj(i,k,1)}>+</button>
                <span style={{fontWeight:700,fontSize:15,minWidth:22}}>{sp[k]}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={() => setSpks(s => [...s, {name:`Speaker ${s.length+1}`,...Object.fromEntries(AK.map(k=>[k,0]))}])}
          style={{padding:"8px 16px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>
          + Add Speaker
        </button>
        <button onClick={() => setSpks(s => s.map(x => ({...x,...Object.fromEntries(AK.map(k=>[k,0]))})))}
          style={{padding:"8px 16px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#ef4444",cursor:"pointer",fontSize:13}}>
          ↺ Reset All
        </button>
      </div>
      <div style={{borderTop:"1px solid #374151",paddingTop:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:"#9ca3af"}}>SUMMARY</div>
        {spks.map((sp,i) => {
          const tot = AK.reduce((a,k) => a+sp[k], 0);
          const det = AW.map((w,j) => w+": "+sp[AK[j]]).filter((_,j) => sp[AK[j]]>0).join("  ·  ");
          return (
            <div key={i} style={{padding:"7px 0",borderBottom:"1px solid #1f2937"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:600}}>{sp.name}</span>
                <span style={{fontWeight:700,fontSize:15,color:tot>5?"#eab308":"#22c55e"}}>×{tot}</span>
              </div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{det||"None recorded"}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WordOfDay() {
  const [w,setW] = useState(""); const [t,setT] = useState("");
  const [d,setD] = useState(""); const [u,setU] = useState("");
  const inp = {background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",
    padding:"8px 11px",fontSize:13,outline:"none",width:"100%"};
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input style={inp} placeholder="Word" value={w} onChange={e=>setW(e.target.value)}/>
        <input style={{...inp,maxWidth:160}} placeholder="Part of speech" value={t} onChange={e=>setT(e.target.value)}/>
      </div>
      <textarea style={{...inp,minHeight:60,resize:"vertical",marginBottom:8,display:"block"}}
        placeholder="Definition…" value={d} onChange={e=>setD(e.target.value)}/>
      <textarea style={{...inp,minHeight:60,resize:"vertical",marginBottom:16,display:"block"}}
        placeholder="Example sentence…" value={u} onChange={e=>setU(e.target.value)}/>
      <div style={{background:"#111827",border:"1px solid #374151",borderRadius:10,padding:16}}>
        <div style={{fontSize:28,fontWeight:700,color:w?"#c084fc":"#4b5563"}}>{w||"—"}</div>
        {t && <div style={{fontSize:12,color:"#9ca3af",fontStyle:"italic",margin:"4px 0 8px"}}>{t}</div>}
        <div style={{fontSize:14,lineHeight:1.6}}>{d}</div>
        {u && <div style={{fontSize:13,color:"#9ca3af",fontStyle:"italic",marginTop:8}}>"{u}"</div>}
      </div>
    </div>
  );
}

function Agenda() {
  const [items, setItems] = useState([...DEF_AGENDA]);
  const inp = {background:"#111827",border:"1px solid #374151",borderRadius:6,color:"#fff",
    padding:"7px 10px",fontSize:13,outline:"none",flex:1};
  return (
    <div>
      {items.map((item,i) => (
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:12,color:"#6b7280",width:20,textAlign:"right",flexShrink:0}}>{i+1}.</span>
          <input style={inp} value={item} onChange={e => setItems(a => a.map((x,j) => j===i ? e.target.value : x))}/>
          <button onClick={() => setItems(a => a.filter((_,j) => j!==i))}
            style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
        </div>
      ))}
      <button onClick={() => setItems(a => [...a,""])}
        style={{width:"100%",padding:"8px",borderRadius:8,border:"1px dashed #374151",
          background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:13,marginTop:4,marginBottom:14}}>
        + Add Item
      </button>
      <div style={{display:"flex",gap:8}}>
        <button onClick={() => {
          const t = items.filter(Boolean).map((a,i) => `${i+1}. ${a}`).join("\n");
          navigator.clipboard.writeText(t).then(() => alert("Agenda copied!"));
        }} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#7c6af7",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
          📋 Copy Agenda
        </button>
        <button onClick={() => setItems([...DEF_AGENDA])}
          style={{padding:"9px 18px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#fff",cursor:"pointer",fontSize:13}}>
          Load Default
        </button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("timer");
  const tabs = [
    ["timer","⏱ Timer"],["roles","👥 Roles"],["ah","💬 Ah Counter"],
    ["word","📖 Word"],["agenda","📋 Agenda"]
  ];
  const card = {background:"#1f2937",borderRadius:12,padding:20};
  return (
    <div style={{minHeight:"100vh",background:"#111827",padding:16}}>
      <div style={{maxWidth:720,margin:"0 auto"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:16,letterSpacing:-0.5}}>
          🎤 Toastmasters Toolkit
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {tabs.map(([id,label]) => (
            <button key={id} onClick={() => setTab(id)} style={{
              padding:"8px 14px", borderRadius:8, cursor:"pointer", fontSize:13,
              border: `2px solid ${tab===id ? "#7c6af7" : "#374151"}`,
              background: tab===id ? "#2a2060" : "#1f2937",
              color: "#fff", fontWeight: tab===id ? 700 : 400
            }}>{label}</button>
          ))}
        </div>
        <div style={card}>
          {tab==="timer"  && <Timer/>}
          {tab==="roles"  && <Roles/>}
          {tab==="ah"     && <AhCounter/>}
          {tab==="word"   && <WordOfDay/>}
          {tab==="agenda" && <Agenda/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
